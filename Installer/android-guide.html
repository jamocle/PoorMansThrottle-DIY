<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Android Installation Guide - Poor Man's Throttle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script>
        (function () {
            const cacheBust = encodeURIComponent(Date.now() + "-" + Math.random());

            const cssLink = document.createElement("link");
            cssLink.rel = "stylesheet";
            cssLink.href = "styles.css?v=" + cacheBust;
            document.head.appendChild(cssLink);

            const appScript = document.createElement("script");
            appScript.type = "module";
            appScript.src = "app.js?v=" + cacheBust;
            document.head.appendChild(appScript);
        })();
    </script>
</head>

<body>
    <div class="wrap">
        <div class="page-header">
            <img src="header.png" alt="Poor Man's Throttle header" class="header-image" />
        </div>

        <div class="guide-toolbar">
            <a href="index.html" class="back-link">← Back</a>
        </div>

        <div class="card guide-card">
            <div class="guide-title-row">
                <img src="android.png" alt="Android" class="guide-platform-icon" />
            </div>

            <div id="guideContent" class="markdown-content">
                <p class="note">Loading instructions...</p>
            </div>
        </div>
    </div>
</body>

</html>
